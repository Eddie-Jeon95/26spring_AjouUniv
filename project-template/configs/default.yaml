# 기본 baseline 학습 설정
# 이 파일은 demo/default 예시입니다.
# 실제 프로젝트에서는 학생이 YAML을 직접 수정하기보다 아래처럼 CLI 인자를 넘겨 실행합니다.
# python scripts/train.py --data data/processed/<file>.csv --target <target> --data-version <version>
# PROJECT_REPORT.md의 training_decisions.split에 실제 split 결정을 기록합니다.
# 데이터가 없으면 scikit-learn 샘플 데이터로 전체 흐름을 점검합니다.

seed: 42
experiment_name: baseline

task:
  type: classification
  positive_class: null

data:
  path: data/raw/dataset.csv
  target_column: label
  data_version: demo-v0
  source: "local CSV or sklearn demo fallback"
  split:
    test_size: 0.2
    val_size: 0.1
    stratify: true

model:
  name: logistic_regression
  task: classification
  save_dir: models
  params:
    max_iter: 1000

tracking:
  runs_dir: experiments/runs
  data_manifest_path: data_manifest.json
  model_registry_path: model_registry.json
  primary_metric: accuracy
  auxiliary_metrics:
    - macro_f1
    - precision_macro
    - recall_macro

automl:
  backend: autogluon
  save_dir: models/automl
  time_limit: 300
  presets: medium_quality
