# 기본 baseline 학습 설정
# 데이터가 없으면 scikit-learn 샘플 데이터로 전체 흐름을 점검합니다.

seed: 42
experiment_name: baseline

data:
  path: data/raw/dataset.csv
  target_column: label
  data_version: demo-v0
  source: "local CSV or sklearn demo fallback"
  split:
    test_size: 0.2
    val_size: 0.1
    stratify: true

model:
  name: logistic_regression
  task: classification
  save_dir: models
  params:
    max_iter: 1000

tracking:
  runs_dir: experiments/runs
  data_manifest_path: data_manifest.json
  model_registry_path: model_registry.json
  primary_metric: accuracy
